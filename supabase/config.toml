project_id = "xfqvaeshidleazgfqlze"

# verify_jwt : quand true, la plateforme Supabase exige un JWT valide (clé anon
# ou token utilisateur) AVANT d'invoquer la fonction. Les fonctions appelées par
# des crons pg_net, des webhooks externes (Stripe) ou en batch doivent rester à
# false et gérer leur propre authentification applicative (voir
# functions/_shared/auth.ts). Chaque fonction présente dans le repo a une entrée
# explicite ci-dessous, alignée sur la valeur actuellement déployée, pour qu'un
# futur `supabase functions deploy` ne bascule pas silencieusement la valeur.

# --- Fonctions présentes dans le repo ---

[functions.analyze-tender]
verify_jwt = false

[functions.classify-host]
verify_jwt = false

[functions.close-expired-tenders]
verify_jwt = false

[functions.create-checkout]
verify_jwt = true

[functions.customer-portal]
verify_jwt = true

[functions.fetch-boamp]
verify_jwt = false

[functions.fetch-dce]
verify_jwt = false

[functions.fetch-dce-agent]
verify_jwt = false

[functions.fetch-dce-mpi]
verify_jwt = false

[functions.fetch-ted]
verify_jwt = false

[functions.generate-memoir]
verify_jwt = false

[functions.generate-pricing-strategy]
verify_jwt = false

[functions.generate-tender-document]
verify_jwt = false

[functions.inspect-dce-zip]
verify_jwt = false

[functions.reclassify-all-hosts]
verify_jwt = false

[functions.reparse-ted-awards]
verify_jwt = false

[functions.stripe-webhook]
verify_jwt = false

[functions.upsert-tenders]
verify_jwt = false

# Invoquée par cron ; idempotente (last_sent_at + intervalle minimal par
# fréquence), donc inoffensive même appelée à répétition de l'extérieur.
[functions.send-alerts]
verify_jwt = false

# NOTE : ne déclarer ici QUE des fonctions dont le dossier existe dans
# supabase/functions/ — la CLI tente de déployer chaque entrée déclarée et
# échoue (« entrypoint path does not exist ») sur une entrée sans source,
# ce qui bloquait tout le workflow deploy-functions. Les fonctions
# historiques uniquement présentes en production (batch-fetch-dce,
# sourcing-scheduler, scrape-list, reclassify-sourcing-urls,
# atexo-backfill) ne sont pas touchées par un déploiement du repo.

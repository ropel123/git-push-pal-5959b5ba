# verify_jwt : quand true, la plateforme Supabase exige un JWT valide (clé anon
# ou token utilisateur) AVANT d'invoquer la fonction. Les fonctions appelées par
# des crons pg_net, des webhooks externes (Stripe) ou en batch doivent rester à
# false et gérer leur propre authentification applicative (voir
# functions/_shared/auth.ts). Chaque fonction présente dans le repo a une entrée
# explicite ci-dessous, alignée sur la valeur actuellement déployée, pour qu'un
# futur `supabase functions deploy` ne bascule pas silencieusement la valeur.

# --- Fonctions présentes dans le repo ---

[functions.analyze-tender]
verify_jwt = false

[functions.classify-host]
verify_jwt = false

[functions.close-expired-tenders]
verify_jwt = false

[functions.create-checkout]

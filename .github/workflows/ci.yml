name: CI

# Garde-fou : détecte immédiatement tout commit qui casse les types ou le build,
# quelle que soit la source (sessions IA, edits manuels).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc -p tsconfig.app.json --noEmit

      - name: Tests
        run: npx vitest run

      - name: Build
        run: npx vite build
